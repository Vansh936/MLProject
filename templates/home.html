<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Exam Performance Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#2575fc);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:100%;
max-width:900px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
border-radius:25px;
padding:40px;
box-shadow:0 20px 40px rgba(0,0,0,.35);
color:white;
}

.title{
text-align:center;
font-size:34px;
font-weight:700;
margin-bottom:8px;
}

.subtitle{
text-align:center;
color:#ddd;
margin-bottom:30px;
}

.form-label{
font-weight:600;
}

.form-control{
background:rgba(255,255,255,.12)!important;
border:1px solid rgba(255,255,255,.25);
color:white!important;
border-radius:12px;
padding:12px;
}

.form-control:focus{
border-color:#00d9ff;
box-shadow:0 0 15px #00d9ff;
}

.form-control::placeholder{
color:#ddd;
}

.form-control option{
color:black;
}

.predict-btn{
width:100%;
padding:15px;
border:none;
border-radius:40px;
font-size:18px;
font-weight:700;
color:white;
background:linear-gradient(90deg,#00c6ff,#0072ff);
transition:.3s;
}

.predict-btn:hover{
transform:translateY(-3px);
box-shadow:0 0 20px #00c6ff;
}

.result{
margin-top:30px;
padding:25px;
text-align:center;
background:rgba(255,255,255,.12);
border-radius:18px;
font-size:28px;
font-weight:700;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{
box-shadow:0 0 20px #00d9ff;
}
}

.footer{
text-align:center;
margin-top:20px;
font-size:13px;
color:#ddd;
}

.icon{
margin-right:8px;
color:#00d9ff;
}

</style>

</head>

<body>

<div class="card">

<div class="title">
<i class="fas fa-graduation-cap"></i>
Student Exam Performance Predictor
</div>

<div class="subtitle">
Predict your Mathematics score using Machine Learning
</div>

<form action="{{ url_for('predict_datapoint') }}" method="post">

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">
<i class="fas fa-user icon"></i>Gender
</label>

<select class="form-control" name="gender" required>

<option selected disabled value="">Select Gender</option>

<option value="male">Male</option>

<option value="female">Female</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

<i class="fas fa-users icon"></i>Race / Ethnicity

</label>

<select class="form-control" name="ethnicity" required>

<option selected disabled value="">Select Group</option>

<option value="group A">Group A</option>

<option value="group B">Group B</option>

<option value="group C">Group C</option>

<option value="group D">Group D</option>

<option value="group E">Group E</option>

</select>

</div>

<div class="col-12 mb-3">

<label class="form-label">

<i class="fas fa-school icon"></i>

Parental Level of Education

</label>

<select class="form-control"

name="parental_level_of_education"

required>

<option selected disabled value="">

Select Education

</option>

<option value="associate's degree">Associate's Degree</option>

<option value="bachelor's degree">Bachelor's Degree</option>

<option value="high school">High School</option>

<option value="master's degree">Master's Degree</option>

<option value="some college">Some College</option>

<option value="some high school">Some High School</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

<i class="fas fa-utensils icon"></i>

Lunch Type

</label>

<select class="form-control"

name="lunch"

required>

<option selected disabled value="">Select Lunch</option>

<option value="standard">Standard</option>

<option value="free/reduced">Free / Reduced</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

<i class="fas fa-book icon"></i>

Test Preparation

</label>

<select class="form-control"

name="test_preparation_course"

required>

<option selected disabled value="">Select Course</option>

<option value="none">None</option>

<option value="completed">Completed</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

<i class="fas fa-book-reader icon"></i>

Reading Score

</label>

<input

class="form-control"

type="number"

name="reading_score"

placeholder="0 - 100"

min="0"

max="100"

required>

</div>

<div class="col-md-6 mb-4">

<label class="form-label">

<i class="fas fa-pencil-alt icon"></i>

Writing Score

</label>

<input

class="form-control"

type="number"

name="writing_score"

placeholder="0 - 100"

min="0"

max="100"

required>

</div>

<div class="col-12">

<button class="predict-btn" type="submit">

<i class="fas fa-robot"></i>

Predict Maths Score

</button>

</div>

</div>

</form>

{% if results is not none %}

<div class="result">

🎯 Predicted Maths Score

<br><br>

{{ results }}

</div>

{% endif %}

<div class="footer">

Powered by Flask • Scikit-Learn • Machine Learning

</div>

</div>

</body>

</html>
